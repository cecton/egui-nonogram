<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">egui-nonogram icon</title>
  <desc id="desc">A stylized nonogram tile with a small filled-cell heart pattern.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1E4D"/>
      <stop offset="100%" stop-color="#160E2E"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6F7F9"/>
      <stop offset="100%" stop-color="#D7DEE8"/>
    </linearGradient>
  </defs>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
  <rect x="96" y="102" width="336" height="336" rx="54" fill="#000000" opacity="0.22"/>
  <rect x="88" y="88" width="336" height="336" rx="54" fill="url(#tile)"/>
  <g>
    <!--
      5x5 filled-cell grid forming a small heart, cells inset from the
      88..424 tile with an 18px margin and 6px gaps between cells.
    -->
    <g fill="#4B2E9E">
      <!-- row 0: cols 1,3 -->
      <rect x="152.4" y="126" width="45.6" height="45.6" rx="6"/>
      <rect x="243.6" y="126" width="45.6" height="45.6" rx="6"/>
      <!-- row 1: cols 0-4 -->
      <rect x="106.8" y="177.6" width="45.6" height="45.6" rx="6"/>
      <rect x="152.4" y="177.6" width="45.6" height="45.6" rx="6"/>
      <rect x="198" y="177.6" width="45.6" height="45.6" rx="6"/>
      <rect x="243.6" y="177.6" width="45.6" height="45.6" rx="6"/>
      <rect x="289.2" y="177.6" width="45.6" height="45.6" rx="6"/>
      <!-- row 2: cols 0-4 -->
      <rect x="106.8" y="229.2" width="45.6" height="45.6" rx="6"/>
      <rect x="152.4" y="229.2" width="45.6" height="45.6" rx="6"/>
      <rect x="198" y="229.2" width="45.6" height="45.6" rx="6"/>
      <rect x="243.6" y="229.2" width="45.6" height="45.6" rx="6"/>
      <rect x="289.2" y="229.2" width="45.6" height="45.6" rx="6"/>
      <!-- row 3: cols 1-3 -->
      <rect x="152.4" y="280.8" width="45.6" height="45.6" rx="6"/>
      <rect x="198" y="280.8" width="45.6" height="45.6" rx="6"/>
      <rect x="243.6" y="280.8" width="45.6" height="45.6" rx="6"/>
      <!-- row 4: col 2 -->
      <rect x="198" y="332.4" width="45.6" height="45.6" rx="6"/>
    </g>
  </g>
</svg>
